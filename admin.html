<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock Finder — Admin</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin: 0;
      background: #0b0f19;
      color: #e8eefc;
    }

    .wrap {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: #121a2a;
      border: 1px solid #21304d;
      border-radius: 14px;
      padding: 20px;
    }

    h1 { margin-top: 0; }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #2a3a5f;
      background: #0f1626;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2b6cff;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .logout {
      background: #223154;
      margin-top: 15px;
    }

    .error {
      color: #ffb4b4;
      margin-top: 10px;
    }

    .hidden { display: none; }

    /* kleine helper (je gebruikt 'muted' in je HTML) */
    .muted { color: #a9b6d6; font-size: 13px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <h1>Admin Login</h1>

      <!-- Login Form -->
      <div id="loginSection">
        <label>Email</label>
        <input id="email" type="email" placeholder="Email adres" />

        <label>Wachtwoord</label>
        <input id="password" type="password" placeholder="Wachtwoord" />

        <button id="loginBtn">Inloggen</button>

        <div id="errorMsg" class="error hidden"></div>
      </div>

      <!-- Dashboard -->
      <div id="adminSection" class="hidden">
        <h2>Welkom, admin 👋</h2>
        <p>Je bent succesvol ingelogd als:</p>
        <strong id="userEmail"></strong>

        <hr style="border:0;border-top:1px solid #21304d;margin:18px 0;">

        <h3 style="margin:0 0 10px 0;">Filialen beheren</h3>

        <div style="margin-bottom:10px;">
          <label class="muted">Kies winkel</label>
          <select id="winkelSelect" style="width:100%; padding:12px; border-radius:10px; border:1px solid #2a3a5f; background:#0f1626; color:white;">
            <option value="">Laden…</option>
          </select>
        </div>

        <div id="filialenStatus" class="muted" style="margin-bottom:10px;"></div>
        <div id="filialenList"></div>

        <div style="display:flex; gap:10px; margin-top:12px;">
          <button id="prevPageBtn" class="logout" style="background:#223154;">Vorige</button>
          <button id="nextPageBtn" class="logout" style="background:#223154;">Volgende</button>
        </div>

        <button class="logout" id="logoutBtn">Uitloggen</button>
      </div>

    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://xqhxvlfuariwoethorke.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxaHh2bGZ1YXJpd29ldGhvcmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MjA4OTksImV4cCI6MjA4NzA5Njg5OX0.fndfzXslGlOoyn3fomGx-6u3vAVakMGhoR87Op8tLHk";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // UI refs
    const loginSection = document.getElementById("loginSection");
    const adminSection = document.getElementById("adminSection");
    const errorMsg = document.getElementById("errorMsg");
    const userEmail = document.getElementById("userEmail");

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.remove("hidden");
    }
    function hideError() {
      errorMsg.classList.add("hidden");
      errorMsg.textContent = "";
    }

    function showAdmin(email) {
      loginSection.classList.add("hidden");
      adminSection.classList.remove("hidden");
      userEmail.textContent = email;

      // laadt admin data
      laadWinkels();
    }

    function showLogin() {
      loginSection.classList.remove("hidden");
      adminSection.classList.add("hidden");
    }

    // ✅ Nieuwe toegang: user_roles tabel
    async function isAdmin(user) {
      const { data, error } = await supabase
        .from("user_roles")
        .select("role")
        .eq("user_id", user.id)
        .single();

      if (error || !data) return false;
      return String(data.role || "").toLowerCase() === "admin";
    }

    // Login
    loginBtn.addEventListener("click", async () => {
      hideError();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        return;
      }

      const ok = await isAdmin(data.user);
      if (!ok) {
        await supabase.auth.signOut();
        showError("Geen toegang tot admin.");
        return;
      }

      showAdmin(data.user.email);
    });

    // Logout
    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      showLogin();
    });

    // Check session on load
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const ok = await isAdmin(session.user);
      if (ok) showAdmin(session.user.email);
    }

    // ===== Filialen beheer (winkel dropdown + paginatie + delete) =====
    let currentWinkelId = null;
    let page = 0;
    const PAGE_SIZE = 10;

    const winkelSelect = document.getElementById("winkelSelect");
    const filialenStatus = document.getElementById("filialenStatus");
    const filialenList = document.getElementById("filialenList");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function laadWinkels() {
      winkelSelect.innerHTML = `<option value="">Laden…</option>`;

      const { data, error } = await supabase
        .from("winkels")
        .select("winkel_id, winkel_naam")
        .order("winkel_naam", { ascending: true });

      if (error) {
        winkelSelect.innerHTML = `<option value="">Fout: ${escapeHtml(error.message)}</option>`;
        return;
      }

      winkelSelect.innerHTML =
        `<option value="">— kies een winkel —</option>` +
        data.map(w => `<option value="${w.winkel_id}">${escapeHtml(w.winkel_naam)}</option>`).join("");

      // Auto-select eerste winkel (optioneel)
      if (data.length > 0) {
        winkelSelect.value = String(data[0].winkel_id);
        currentWinkelId = data[0].winkel_id;
        page = 0;
        await laadFilialen();
      } else {
        currentWinkelId = null;
        page = 0;
        await laadFilialen();
      }
    }

    async function laadFilialen() {
      filialenList.innerHTML = "";

      if (!currentWinkelId) {
        filialenStatus.textContent = "Kies eerst een winkel.";
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        return;
      }

      filialenStatus.textContent = "Laden…";

      const from = page * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;

      const { data, error } = await supabase
        .from("filialen")
        .select("filiaal_id, filiaal_naam, stad, adres")
        .eq("winkel_id", currentWinkelId)
        .order("filiaal_id", { ascending: true })
        .range(from, to);

      if (error) {
        filialenStatus.textContent = "Fout bij laden filialen: " + error.message;
        prevPageBtn.disabled = page === 0;
        nextPageBtn.disabled = true;
        return;
      }

      filialenStatus.textContent = `Pagina ${page + 1} (max ${PAGE_SIZE} filialen)`;

      prevPageBtn.disabled = page === 0;
      nextPageBtn.disabled = data.length < PAGE_SIZE;

      if (data.length === 0) {
        filialenList.innerHTML = `<div class="muted">Geen filialen gevonden voor deze winkel.</div>`;
        return;
      }

      data.forEach((f) => {
        const div = document.createElement("div");
        div.style.border = "1px solid #21304d";
        div.style.background = "#0f1626";
        div.style.borderRadius = "12px";
        div.style.padding = "10px";
        div.style.marginTop = "8px";
        div.style.display = "flex";
        div.style.justifyContent = "space-between";
        div.style.gap = "10px";
        div.style.alignItems = "center";

        const left = document.createElement("div");
        left.innerHTML = `
          <div><strong>${escapeHtml(f.filiaal_naam)}</strong> — ${escapeHtml(f.stad)}</div>
          <div style="color:#a9b6d6;font-size:13px;">
            filiaal_id: ${escapeHtml(f.filiaal_id)} · ${escapeHtml(f.adres)}
          </div>
        `;

        const btn = document.createElement("button");
        btn.textContent = "Verwijder";
        btn.style.width = "auto";
        btn.style.background = "#ff3b3b";
        btn.style.padding = "10px 12px";
        btn.style.borderRadius = "10px";

        btn.addEventListener("click", async () => {
          const ok = confirm(
            `Weet je zeker dat je dit filiaal wilt verwijderen?\n\n` +
            `${f.filiaal_naam} — ${f.stad}\nfiliaal_id: ${f.filiaal_id}\n\n` +
            `Alle voorraadregels voor dit filiaal worden ook verwijderd.\n` +
            `Producten blijven bestaan voor andere filialen.`
          );
          if (!ok) return;

          btn.disabled = true;
          btn.textContent = "Bezig…";

          const { error: rpcError } = await supabase.rpc("admin_delete_filiaal", {
            p_filiaal_id: f.filiaal_id
          });

          if (rpcError) {
            alert("Verwijderen mislukt: " + rpcError.message);
            btn.disabled = false;
            btn.textContent = "Verwijder";
            return;
          }

          // Na delete: pagina opnieuw laden (en als pagina leeg is, 1 pagina terug)
          const { data: checkData } = await supabase
            .from("filialen")
            .select("filiaal_id")
            .eq("winkel_id", currentWinkelId)
            .range(page * PAGE_SIZE, page * PAGE_SIZE);

          if (!checkData || checkData.length === 0) {
            page = Math.max(0, page - 1);
          }

          await laadFilialen();
        });

        div.appendChild(left);
        div.appendChild(btn);
        filialenList.appendChild(div);
      });
    }

    // Events
    winkelSelect?.addEventListener("change", async () => {
      currentWinkelId = winkelSelect.value ? Number(winkelSelect.value) : null;
      page = 0;
      await laadFilialen();
    });

    prevPageBtn?.addEventListener("click", async () => {
      if (page > 0) page--;
      await laadFilialen();
    });

    nextPageBtn?.addEventListener("click", async () => {
      page++;
      await laadFilialen();
    });
  </script>
</body>
</html>
