<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock Finder — Admin</title>

  <style>
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin: 0;
      background: #0b0f19;
      color: #e8eefc;
    }
    .wrap{ max-width: 720px; margin: 40px auto; padding: 20px; }
    .card{
      background: #121a2a;
      border: 1px solid #21304d;
      border-radius: 14px;
      padding: 20px;
    }
    h1{ margin: 0 0 10px 0; }
    h2{ margin: 0 0 10px 0; }
    hr{ border:0; border-top:1px solid #21304d; margin:18px 0; }

    label{ display:block; margin-top: 10px; color:#a9b6d6; font-size: 13px; }

    input, select{
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #2a3a5f;
      background: #0f1626;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }

    button{
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2b6cff;
      color: white;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled{ opacity:.6; cursor:not-allowed; }

    .btn-secondary{ background:#223154; }
    .btn-danger{ background:#ff3b3b; }

    .row{ display:flex; gap:10px; }
    .row > *{ flex:1; }

    .muted{ color:#a9b6d6; font-size: 13px; }
    .error{ color:#ffb4b4; margin-top:10px; }
    .ok{ color:#a7f3b1; margin-top:10px; }

    .hidden{ display:none; }

    .filiaal-card{
      border: 1px solid #21304d;
      background: #0f1626;
      border-radius: 12px;
      padding: 10px;
      margin-top: 8px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }
    .filiaal-meta{ color:#a9b6d6; font-size: 13px; margin-top:4px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <h1>Admin</h1>
      <div class="muted">Alleen toegankelijk voor gebruikers met role <strong>admin</strong> in <code>user_roles</code>.</div>

      <!-- LOGIN -->
      <div id="loginSection">
        <h2 style="margin-top:16px;">Inloggen</h2>

        <label>Email</label>
        <input id="email" type="email" placeholder="Email adres" autocomplete="email" />

        <label>Wachtwoord</label>
        <input id="password" type="password" placeholder="Wachtwoord" autocomplete="current-password" />

        <button id="loginBtn">Inloggen</button>
        <div id="loginMsg" class="error hidden"></div>
      </div>

      <!-- ADMIN DASHBOARD -->
      <div id="adminSection" class="hidden">
        <h2 style="margin-top:16px;">Welkom, admin 👋</h2>
        <div class="muted">Je bent ingelogd als:</div>
        <strong id="userEmail"></strong>

        <hr>

        <h3 style="margin:0 0 10px 0;">Filialen beheren</h3>

        <label>Kies winkel</label>
        <select id="winkelSelect">
          <option value="">Laden…</option>
        </select>

        <div id="filialenStatus" class="muted" style="margin-top:6px;"></div>
        <div id="filialenList"></div>

        <div class="row" style="margin-top:12px;">
          <button id="prevPageBtn" class="btn-secondary">Vorige</button>
          <button id="nextPageBtn" class="btn-secondary">Volgende</button>
        </div>

        <hr>

        <button id="logoutBtn" class="btn-secondary">Uitloggen</button>
      </div>

    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://xqhxvlfuariwoethorke.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxaHh2bGZ1YXJpd29ldGhvcmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MjA4OTksImV4cCI6MjA4NzA5Njg5OX0.fndfzXslGlOoyn3fomGx-6u3vAVakMGhoR87Op8tLHk";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // UI
    const loginSection = document.getElementById("loginSection");
    const adminSection = document.getElementById("adminSection");
    const loginMsg = document.getElementById("loginMsg");
    const userEmailEl = document.getElementById("userEmail");

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const winkelSelect = document.getElementById("winkelSelect");
    const filialenStatus = document.getElementById("filialenStatus");
    const filialenList = document.getElementById("filialenList");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");

    // Paging
    let currentWinkelId = null;
    let page = 0;
    const PAGE_SIZE = 10;

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showLogin(message = "") {
      adminSection.classList.add("hidden");
      loginSection.classList.remove("hidden");
      if (message) {
        loginMsg.textContent = message;
        loginMsg.classList.remove("hidden");
        loginMsg.classList.remove("ok");
        loginMsg.classList.add("error");
      } else {
        loginMsg.textContent = "";
        loginMsg.classList.add("hidden");
      }
    }

    function showAdmin(email) {
      loginSection.classList.add("hidden");
      adminSection.classList.remove("hidden");
      userEmailEl.textContent = email;
    }

    async function isAdmin(user) {
      // Verwacht tabel: public.user_roles(user_id uuid primary key, role text)
      const { data, error } = await supabase
        .from("user_roles")
        .select("role")
        .eq("user_id", user.id)
        .single();

      if (error || !data) return false;
      return String(data.role || "").toLowerCase() === "admin";
    }

    async function requireAdminOrLogout() {
      const { data: { user }, error } = await supabase.auth.getUser();
      if (error || !user) {
        showLogin();
        return null;
      }

      const ok = await isAdmin(user);
      if (!ok) {
        await supabase.auth.signOut();
        showLogin("Geen toegang tot admin.");
        return null;
      }

      showAdmin(user.email);
      return user;
    }

    // ---------- Login ----------
    loginBtn.addEventListener("click", async () => {
      loginBtn.disabled = true;
      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          showLogin(error.message);
          return;
        }

        const ok = await isAdmin(data.user);
        if (!ok) {
          await supabase.auth.signOut();
          showLogin("Geen toegang tot admin.");
          return;
        }

        showAdmin(data.user.email);
        await laadWinkels(); // pas laden als admin OK
      } finally {
        loginBtn.disabled = false;
      }
    });

    // ---------- Logout ----------
    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      showLogin();
    });

    // ---------- Winkels / Filialen ----------
    async function laadWinkels() {
      winkelSelect.innerHTML = `<option value="">Laden…</option>`;
      filialenList.innerHTML = "";
      filialenStatus.textContent = "";

      const { data, error } = await supabase
        .from("winkels")
        .select("winkel_id, winkel_naam")
        .order("winkel_naam", { ascending: true });

      if (error) {
        winkelSelect.innerHTML = `<option value="">Fout: ${escapeHtml(error.message)}</option>`;
        return;
      }

      winkelSelect.innerHTML =
        `<option value="">— kies een winkel —</option>` +
        (data || []).map(w => `<option value="${w.winkel_id}">${escapeHtml(w.winkel_naam)}</option>`).join("");

      // Belangrijk: NIET automatisch naar eerste winkel springen
      currentWinkelId = null;
      page = 0;
      prevPageBtn.disabled = true;
      nextPageBtn.disabled = true;
      filialenStatus.textContent = "Kies eerst een winkel.";
    }

    async function laadFilialen() {
      filialenList.innerHTML = "";

      if (!currentWinkelId) {
        filialenStatus.textContent = "Kies eerst een winkel.";
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        return;
      }

      filialenStatus.textContent = "Laden…";

      const from = page * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;

      const { data, error } = await supabase
        .from("filialen")
        .select("filiaal_id, filiaal_naam, stad, adres")
        .eq("winkel_id", currentWinkelId)
        .order("filiaal_id", { ascending: true })
        .range(from, to);

      if (error) {
        filialenStatus.textContent = "Fout bij laden filialen: " + error.message;
        prevPageBtn.disabled = page === 0;
        nextPageBtn.disabled = true;
        return;
      }

      const rows = data || [];
      filialenStatus.textContent = `Pagina ${page + 1} (max ${PAGE_SIZE} filialen)`;

      prevPageBtn.disabled = page === 0;
      nextPageBtn.disabled = rows.length < PAGE_SIZE;

      if (rows.length === 0) {
        filialenList.innerHTML = `<div class="muted">Geen filialen gevonden voor deze winkel.</div>`;
        return;
      }

      rows.forEach((f) => {
        const wrap = document.createElement("div");
        wrap.className = "filiaal-card";

        const left = document.createElement("div");
        left.innerHTML = `
          <div><strong>${escapeHtml(f.filiaal_naam)}</strong> — ${escapeHtml(f.stad)}</div>
          <div class="filiaal-meta">filiaal_id: ${escapeHtml(f.filiaal_id)} · ${escapeHtml(f.adres)}</div>
        `;

        const btn = document.createElement("button");
        btn.className = "btn-danger";
        btn.style.width = "auto";
        btn.style.padding = "10px 12px";
        btn.textContent = "Verwijder";

        btn.addEventListener("click", async () => {
          const ok = confirm(
            `Weet je zeker dat je dit filiaal wilt verwijderen?\n\n` +
            `${f.filiaal_naam} — ${f.stad}\nfiliaal_id: ${f.filiaal_id}\n\n` +
            `Alle voorraadregels voor dit filiaal worden ook verwijderd.\n` +
            `Producten blijven bestaan voor andere filialen.`
          );
          if (!ok) return;

          btn.disabled = true;
          btn.textContent = "Bezig…";

          const { error: rpcError } = await supabase.rpc("admin_delete_filiaal", {
            p_filiaal_id: f.filiaal_id
          });

          if (rpcError) {
            alert("Verwijderen mislukt: " + rpcError.message);
            btn.disabled = false;
            btn.textContent = "Verwijder";
            return;
          }

          // Als deze pagina leeg wordt, 1 pagina terug
          const { data: checkData } = await supabase
            .from("filialen")
            .select("filiaal_id")
            .eq("winkel_id", currentWinkelId)
            .range(page * PAGE_SIZE, page * PAGE_SIZE);

          if (!checkData || checkData.length === 0) {
            page = Math.max(0, page - 1);
          }

          await laadFilialen();
        });

        wrap.appendChild(left);
        wrap.appendChild(btn);
        filialenList.appendChild(wrap);
      });
    }

    winkelSelect.addEventListener("change", async () => {
      currentWinkelId = winkelSelect.value ? Number(winkelSelect.value) : null;
      page = 0;
      await laadFilialen();
    });

    prevPageBtn.addEventListener("click", async () => {
      if (page > 0) page--;
      await laadFilialen();
    });

    nextPageBtn.addEventListener("click", async () => {
      page++;
      await laadFilialen();
    });

    // ---------- Init ----------
    // Eerst checken of er een session is en of die user admin is.
    const user = await requireAdminOrLogout();
    if (user) {
      await laadWinkels();
    }
  </script>
</body>
</html>
