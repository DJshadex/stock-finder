<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock Finder — Admin</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin: 0;
      background: #0b0f19;
      color: #e8eefc;
    }

    .wrap {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: #121a2a;
      border: 1px solid #21304d;
      border-radius: 14px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #2a3a5f;
      background: #0f1626;
      color: white;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2b6cff;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .logout {
      background: #223154;
      margin-top: 15px;
    }

    .error {
      color: #ffb4b4;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <h1>Admin Login</h1>

      <!-- Login Form -->
      <div id="loginSection">
        <label>Email</label>
        <input id="email" type="email" placeholder="webmailborre@gmail.com" />

        <label>Wachtwoord</label>
        <input id="password" type="password" placeholder="••••••••" />

        <button id="loginBtn">Inloggen</button>

        <div id="errorMsg" class="error hidden"></div>
      </div>

      <!-- Dashboard -->
      <div id="adminSection" class="hidden">
        <h2>Welkom, admin 👋</h2>
        <p>Je bent succesvol ingelogd als:</p>
        <strong id="userEmail"></strong>

        <button class="logout" id="logoutBtn">Uitloggen</button>
      </div>

    </div>
  </div>

  <!-- Supabase via ES module -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://xqhxvlfuariwoethorke.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxaHh2bGZ1YXJpd29ldGhvcmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MjA4OTksImV4cCI6MjA4NzA5Njg5OX0.fndfzXslGlOoyn3fomGx-6u3vAVakMGhoR87Op8tLHk";

    const ALLOWED_EMAIL = "webmailborre@gmail.com";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginSection = document.getElementById("loginSection");
    const adminSection = document.getElementById("adminSection");
    const errorMsg = document.getElementById("errorMsg");
    const userEmail = document.getElementById("userEmail");

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.remove("hidden");
    }

    function hideError() {
      errorMsg.classList.add("hidden");
      errorMsg.textContent = "";
    }

    function showAdmin(email) {
      loginSection.classList.add("hidden");
      adminSection.classList.remove("hidden");
      userEmail.textContent = email;
    }

    function showLogin() {
      loginSection.classList.remove("hidden");
      adminSection.classList.add("hidden");
    }

    // Login
    loginBtn.addEventListener("click", async () => {
      hideError();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showError(error.message);
        return;
      }

      if (data.user.email !== ALLOWED_EMAIL) {
        await supabase.auth.signOut();
        showError("Geen toegang tot admin.");
        return;
      }

      showAdmin(data.user.email);
    });

    // Logout
    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      showLogin();
    });

    // Check session on load
    const { data: { session } } = await supabase.auth.getSession();
    if (session && session.user.email === ALLOWED_EMAIL) {
      showAdmin(session.user.email);
    }
  </script>
</body>
</html>
