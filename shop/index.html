<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stock Finder — Shop</title>

<style>
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  margin:0;
  background:#0b0f19;
  color:#e8eefc;
}
.wrap{max-width:800px;margin:40px auto;padding:20px;}
.card{
  background:#121a2a;
  border:1px solid #21304d;
  border-radius:14px;
  padding:20px;
}
h1{margin:0 0 10px 0;}
h2{margin:0 0 10px 0;}
hr{border:0;border-top:1px solid #21304d;margin:18px 0;}

label{display:block;margin-top:10px;color:#a9b6d6;font-size:13px;}

input{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #2a3a5f;
  background:#0f1626;
  color:white;
  font-size:14px;
  box-sizing:border-box;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:700;
}

.btn-primary{
  width:100%;
  background:#ff8a00;
  color:#0b0f19;
}

.btn-secondary{
  background:#223154;
  color:#e8eefc;
  width:100%;
}

.muted{color:#a9b6d6;font-size:13px;}
.error{color:#ffb4b4;margin-top:10px;}
.hidden{display:none !important;}

.filiaal-card{
  border:1px solid #21304d;
  background:#0f1626;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}
.search-box{
  margin-bottom:10px;
}
.pagination{
  display:flex;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<h1>Shop Dashboard</h1>
<div class="muted">Toegang voor winkels en admins.</div>

<!-- LOGIN -->
<div id="loginSection">
  <h2 style="margin-top:16px;">Inloggen</h2>

  <label>Email</label>
  <input id="email" type="email" placeholder="Email adres" />

  <label>Wachtwoord</label>
  <input id="password" type="password" placeholder="Wachtwoord" />

  <button id="loginBtn" class="btn-primary">Inloggen</button>
  <div id="loginMsg" class="error hidden"></div>
</div>

<!-- DASHBOARD -->
<div id="shopSection" class="hidden">
  <h2>Welkom 👋</h2>
  <div class="muted">Ingelogd als:</div>
  <strong id="userEmail"></strong>

  <hr>

  <div id="filialenContainer"></div>

  <div id="paginationControls" class="pagination hidden">
    <button id="prevBtn" class="btn-secondary">Vorige</button>
    <button id="nextBtn" class="btn-secondary">Volgende</button>
  </div>

  <hr>
  <button id="logoutBtn" class="btn-secondary">Uitloggen</button>
</div>

</div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://xqhxvlfuariwoethorke.supabase.co";
const SUPABASE_ANON_KEY = "JOUW_ANON_KEY_HIER";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginSection = document.getElementById("loginSection");
const shopSection = document.getElementById("shopSection");
const loginMsg = document.getElementById("loginMsg");
const userEmailEl = document.getElementById("userEmail");
const filialenContainer = document.getElementById("filialenContainer");
const paginationControls = document.getElementById("paginationControls");

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

let currentPage = 0;
const PAGE_SIZE = 10;
let allFilialen = [];

function showError(msg){
  loginMsg.textContent = msg;
  loginMsg.classList.remove("hidden");
}

function showLogin(){
  shopSection.classList.add("hidden");
  loginSection.classList.remove("hidden");
}

function showShop(email){
  loginSection.classList.add("hidden");
  shopSection.classList.remove("hidden");
  userEmailEl.textContent = email;
}

async function getAccess(user){
  const { data } = await supabase
    .from("user_roles")
    .select("role, filiaal_id")
    .eq("user_id", user.id);

  return data;
}

async function loadFilialenForUser(user){
  const access = await getAccess(user);
  if(!access || access.length === 0) return [];

  const roles = access.map(a => a.role.toLowerCase());
  const isAdmin = roles.includes("admin");

  if(isAdmin){
    const { data } = await supabase
      .from("filialen")
      .select("filiaal_id, filiaal_naam, stad, adres")
      .order("filiaal_naam",{ascending:true});
    return data || [];
  } else {
    const ids = access
      .filter(a => a.role.toLowerCase() === "shop")
      .map(a => a.filiaal_id);

    const { data } = await supabase
      .from("filialen")
      .select("filiaal_id, filiaal_naam, stad, adres")
      .in("filiaal_id", ids)
      .order("filiaal_naam",{ascending:true});

    return data || [];
  }
}

function renderFilialen(){
  filialenContainer.innerHTML = "";

  if(allFilialen.length === 1){
    const f = allFilialen[0];
    filialenContainer.innerHTML = `
      <div class="filiaal-card">
        <strong>${f.filiaal_naam}</strong><br>
        ${f.stad} — ${f.adres}
      </div>
    `;
    paginationControls.classList.add("hidden");
    return;
  }

  const start = currentPage * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageItems = allFilialen.slice(start,end);

  pageItems.forEach(f => {
    const div = document.createElement("div");
    div.className = "filiaal-card";
    div.innerHTML = `
      <strong>${f.filiaal_naam}</strong><br>
      ${f.stad} — ${f.adres}
    `;
    filialenContainer.appendChild(div);
  });

  paginationControls.classList.remove("hidden");
  document.getElementById("prevBtn").disabled = currentPage === 0;
  document.getElementById("nextBtn").disabled = end >= allFilialen.length;
}

loginBtn.addEventListener("click", async ()=>{
  loginMsg.classList.add("hidden");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({email,password});
  if(error){
    showError(error.message);
    return;
  }

  const access = await getAccess(data.user);
  if(!access || access.length === 0){
    await supabase.auth.signOut();
    showError("Geen toegang.");
    return;
  }

  const roles = access.map(a=>a.role.toLowerCase());
  if(!roles.includes("shop") && !roles.includes("admin")){
    await supabase.auth.signOut();
    showError("Geen toegang.");
    return;
  }

  showShop(data.user.email);

  allFilialen = await loadFilialenForUser(data.user);
  renderFilialen();
});

document.getElementById("prevBtn").addEventListener("click",()=>{
  if(currentPage>0){
    currentPage--;
    renderFilialen();
  }
});

document.getElementById("nextBtn").addEventListener("click",()=>{
  currentPage++;
  renderFilialen();
});

logoutBtn.addEventListener("click", async ()=>{
  await supabase.auth.signOut();
  showLogin();
});

</script>
</body>
</html>
